global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: guildest-api
    static_configs:
      - targets:
          - host.docker.internal:18080

  - job_name: guildest-worker
    static_configs:
      - targets:
          - host.docker.internal:19091

  - job_name: guildest-gateway
    static_configs:
      - targets:
          - host.docker.internal:9092

  - job_name: guildest-intake-lab
    static_configs:
      - targets:
          - host.docker.internal:29091
