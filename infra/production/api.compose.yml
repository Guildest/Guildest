services:
  postgres:
    image: postgres:17-alpine
    container_name: guildest-prod-postgres
    environment:
      POSTGRES_DB: guildest
      POSTGRES_USER: guildest
      POSTGRES_PASSWORD: guildest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guildest -d guildest"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: valkey/valkey:8-alpine
    container_name: guildest-prod-redis
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: ${API_IMAGE}
    container_name: guildest-prod-api
    env_file:
      - .env
    environment:
      API_BIND_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://guildest:guildest@postgres:5432/guildest
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: guildest-prod-caddy
    environment:
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
