services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: guildest
      POSTGRES_USER: guildest
      POSTGRES_PASSWORD: guildest
    ports:
      - "55432:5432"
    volumes:
      - backfill_lab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guildest -d guildest"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  backfill_lab_postgres_data:
