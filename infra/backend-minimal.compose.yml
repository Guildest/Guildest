services:
  postgres:
    image: postgres:17-alpine
    container_name: guildest-codex-postgres
    environment:
      POSTGRES_DB: guildest_codex
      POSTGRES_USER: guildest
      POSTGRES_PASSWORD: guildest
    ports:
      - "15432:5432"
    volumes:
      - guildest_codex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guildest -d guildest_codex"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: valkey/valkey:8-alpine
    container_name: guildest-codex-redis
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  guildest_codex_postgres_data:
