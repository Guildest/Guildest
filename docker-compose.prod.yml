# Production compose template:
# - Uses externally-managed Postgres/Redis (set env vars).
# - Runs API + gateway + workers (including commands).
#
# This file expects you to provide a prebuilt image via `IMAGE_NAME` + `IMAGE_TAG`.
# Recommended: build on an ARM64 runner (or buildx) and deploy by pulling the image.

services:
  api:
    image: ${IMAGE_NAME:-guildest}:${IMAGE_TAG:-latest}
    command: ["python", "-m", "backend.api.main"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      QUEUE_STREAM: ${QUEUE_STREAM:-guildest:events}
      QUEUE_MAX_LENGTH: ${QUEUE_MAX_LENGTH:-5000}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?set FRONTEND_BASE_URL}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:?set DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:?set DISCORD_CLIENT_SECRET}
      DISCORD_OAUTH_REDIRECT_URI: ${DISCORD_OAUTH_REDIRECT_URI:?set DISCORD_OAUTH_REDIRECT_URI}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
    ports:
      - "8000:8000"

  gateway:
    image: ${IMAGE_NAME:-guildest}:${IMAGE_TAG:-latest}
    command: ["python", "-m", "backend.discord_gateway.main"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set DISCORD_TOKEN}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      DISCORD_COMMANDS_GUILD_ID: ${DISCORD_COMMANDS_GUILD_ID:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?set FRONTEND_BASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      QUEUE_STREAM: ${QUEUE_STREAM:-guildest:events}
      QUEUE_MAX_LENGTH: ${QUEUE_MAX_LENGTH:-5000}
      # Optional: enables DB-backed slash commands (/stats, /sentiment, /modlogs)
      DATABASE_URL: ${DATABASE_URL:-}

  worker-analytics:
    image: ${IMAGE_NAME:-guildest}:${IMAGE_TAG:-latest}
    command: ["python", "-m", "backend.workers.analytics.main"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      QUEUE_STREAM: ${QUEUE_STREAM:-guildest:events}
      QUEUE_MAX_LENGTH: ${QUEUE_MAX_LENGTH:-5000}
      QUEUE_GROUP: ${QUEUE_GROUP:-guildest-workers}
      QUEUE_CONSUMER: ${QUEUE_CONSUMER_ANALYTICS:-analytics-1}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}

  worker-moderation:
    image: ${IMAGE_NAME:-guildest}:${IMAGE_TAG:-latest}
    command: ["python", "-m", "backend.workers.moderation.main"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      QUEUE_STREAM: ${QUEUE_STREAM:-guildest:events}
      QUEUE_MAX_LENGTH: ${QUEUE_MAX_LENGTH:-5000}
      QUEUE_GROUP: ${QUEUE_GROUP:-guildest-workers}
      QUEUE_CONSUMER: ${QUEUE_CONSUMER_MODERATION:-moderation-1}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}

  worker-sentiment:
    image: ${IMAGE_NAME:-guildest}:${IMAGE_TAG:-latest}
    command: ["python", "-m", "backend.workers.sentiment.main"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      QUEUE_STREAM: ${QUEUE_STREAM:-guildest:events}
      QUEUE_MAX_LENGTH: ${QUEUE_MAX_LENGTH:-5000}
      QUEUE_GROUP: ${QUEUE_GROUP:-guildest-workers}
      QUEUE_CONSUMER: ${QUEUE_CONSUMER_SENTIMENT:-sentiment-1}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-v3.2}

  worker-commands:
    image: ${IMAGE_NAME:-guildest}:${IMAGE_TAG:-latest}
    command: ["python", "-m", "backend.workers.commands.main"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set DISCORD_TOKEN}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?set FRONTEND_BASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      QUEUE_STREAM: ${QUEUE_STREAM:-guildest:events}
      QUEUE_MAX_LENGTH: ${QUEUE_MAX_LENGTH:-5000}
      QUEUE_GROUP: ${QUEUE_GROUP:-guildest-workers}
      QUEUE_CONSUMER: ${QUEUE_CONSUMER_COMMANDS:-commands-1}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}

  frontend:
    image: ${FRONTEND_IMAGE_NAME:-guildest-frontend}:${FRONTEND_IMAGE_TAG:-latest}
    environment:
      NEXT_PUBLIC_API_URL: /api
      API_BASE: http://api:8000
      NODE_ENV: production
    volumes:
      # Override nginx config at deploy-time so it doesn't hard-fail if `api` is
      # temporarily down during rollout.
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
